name: CI/CD - Valori Venali

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]


jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Syntax check (Lint)
        run: |
          find src -name "*.php" -print0 | xargs -0 -n1 php -l

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set lowercase image owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          # Remove any surrounding double quotes, then lowercase
          OWNER_CLEAN=$(echo "$OWNER" | tr -d '"')
          IMAGE_OWNER=$(echo "$OWNER_CLEAN" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_OWNER=$IMAGE_OWNER" >> $GITHUB_ENV

          # Determine version and revision (for links)
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            REVISION=${GITHUB_REF#refs/tags/}
            IS_TAG="true"
            LATEST_TAG="ghcr.io/$IMAGE_OWNER/valori-venali:latest"
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            VERSION="${BRANCH_NAME}-$(echo $GITHUB_SHA | cut -c1-7)"
            REVISION=${GITHUB_SHA}
            IS_TAG="false"
            if [[ "$BRANCH_NAME" == "master" ]]; then
              LATEST_TAG="ghcr.io/$IMAGE_OWNER/valori-venali:latest"
            else
              LATEST_TAG=""
            fi
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_REVISION=$REVISION" >> $GITHUB_ENV
          echo "APP_IS_TAG=$IS_TAG" >> $GITHUB_ENV
          echo "GITHUB_URL=https://github.com/${{ github.repository }}" >> $GITHUB_ENV
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          # build context is repository root so Dockerfile can COPY src/
          context: .
          file: docker/php/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            APP_REVISION=${{ env.APP_REVISION }}
            APP_IS_TAG=${{ env.APP_IS_TAG }}
            GITHUB_URL=${{ env.GITHUB_URL }}
          tags: |
            ${{ env.LATEST_TAG }}
            ghcr.io/${{ env.IMAGE_OWNER }}/valori-venali:${{ env.APP_VERSION }}
            ghcr.io/${{ env.IMAGE_OWNER }}/valori-venali:${{ github.sha }}

