services:

  db:
    # Build a custom image that contains the initdb scripts to avoid host bind mounts
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: valori_venali_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - valori_net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # In development leave `build` to rebuild from local Dockerfile.
    # For production, you can use the published image on GHCR:
    # image: ghcr.io/Comune-di-Montesilvano/valori-venali:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: valori_venali_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_SECRET: ${APP_SECRET}
      APP_ADMIN_USER: ${APP_ADMIN_USER}
      APP_ADMIN_PASS: ${APP_ADMIN_PASS}
      COMUNE_NOME: ${COMUNE_NOME}
      COMUNE_PROVINCIA: ${COMUNE_PROVINCIA}
    volumes:
      # Use a named volume for the application code in production
      - app_code:/var/www/html
      # Persistent uploads (separate volume)
      - app_uploads:/var/www/html/uploads
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - valori_net

volumes:
  db_data:
    driver: local
  app_code:
    driver: local
  app_uploads:
    driver: local

networks:
  valori_net:
    driver: bridge
