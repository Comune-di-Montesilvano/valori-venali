description:
  it:
    localisedName: "Valori Venali Aree Fabbricabili"
    shortDescription: >
      Applicativo web per il calcolo dei valori venali delle aree
      fabbricabili basato sui dati OMI dell'Agenzia delle Entrate.
    longDescription: >
      Applicativo web per il calcolo della Stima dei Valori Venali delle
      Aree Fabbricabili, sviluppato dal Comune di Montesilvano e destinato
      agli enti locali italiani. Il software si basa sui valori OMI
      (Osservatorio del Mercato Immobiliare) dell'Agenzia delle Entrate
      e consente di determinare il valore venale delle aree edificabili
      ai fini ICI/IMU secondo quanto previsto dal D.L. 504/1992.
      Comprende un'area amministrativa per l'importazione dei dati OMI
      tramite file CSV dal Portale Sister e la gestione dei coefficienti
      di destinazione e abbattimento, nonché un'interfaccia pubblica per
      il calcolo della stima. Il deployment è gestito tramite Docker
      Compose con immagini pubblicate su GitHub Container Registry.
    features:
      - Calcolo della stima dei valori venali delle aree fabbricabili
      - Importazione dati OMI da CSV (Portale Sister, Agenzia delle Entrate)
      - Gestione coefficienti di destinazione e abbattimento
      - Area amministrativa protetta da autenticazione
      - Interfaccia pubblica per il calcolo della stima
      - Deploy containerizzato tramite Docker Compose
      - Conforme alla formula D.L. 504/1992

